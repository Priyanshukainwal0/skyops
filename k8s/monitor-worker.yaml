apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitor-worker
  namespace: skyops
  labels:
    app: monitor-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitor-worker
  template:
    metadata:
      labels:
        app: monitor-worker
    spec:
      containers:
        - name: monitor-worker
          image: skyops-monitor-worker:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: skyops-config
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
