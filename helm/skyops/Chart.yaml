apiVersion: v2
name: skyops
description: Cloud uptime monitoring system — 3-service microservices stack
type: application
version: 0.2.0
appVersion: "1.0.0"
keywords:
  - monitoring
  - uptime
  - microservices
maintainers:
  - name: Priyanshukainwal0

dependencies:
  - name: prometheus
    version: "25.27.0"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: prometheus.enabled
  - name: grafana
    version: "8.6.4"
    repository: "https://grafana.github.io/helm-charts"
    condition: grafana.enabled
