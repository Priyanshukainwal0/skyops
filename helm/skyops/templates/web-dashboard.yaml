apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-dashboard
  namespace: skyops
  labels:
    app: web-dashboard
    {{- include "skyops.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.webDashboard.replicas }}
  selector:
    matchLabels:
      app: web-dashboard
  template:
    metadata:
      labels:
        app: web-dashboard
    spec:
      containers:
        - name: web-dashboard
          image: {{ .Values.image.registry }}/skyops-web-dashboard:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            {{- toYaml .Values.webDashboard.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: web-dashboard
  namespace: skyops
  labels:
    {{- include "skyops.labels" . | nindent 4 }}
spec:
  selector:
    app: web-dashboard
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
