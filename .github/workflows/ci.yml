name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/priyanshukainwal0

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: api-gateway/requirements.txt

      - name: Install dependencies
        run: |
          cd api-gateway
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          cd api-gateway
          python -m pytest tests/ -v

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/skyops-api-gateway:latest
            ${{ env.IMAGE_PREFIX }}/skyops-api-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push monitor-worker
        uses: docker/build-push-action@v5
        with:
          context: ./monitor-worker
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/skyops-monitor-worker:latest
            ${{ env.IMAGE_PREFIX }}/skyops-monitor-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push web-dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./web-dashboard
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/skyops-web-dashboard:latest
            ${{ env.IMAGE_PREFIX }}/skyops-web-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
