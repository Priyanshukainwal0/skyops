services:
  - type: web
    name: skyops-api
    runtime: docker
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: ./api-gateway
    plan: free
    envVars:
      - key: DB_PATH
        value: /tmp/skyops.db
      - key: REQUEST_TIMEOUT
        value: "10"

  - type: cron
    name: skyops-checks
    runtime: image
    image:
      url: docker.io/curlimages/curl:latest
    schedule: "* * * * *"
    plan: free
    command: curl -s -X POST https://skyops-api-8dn9.onrender.com/api/run-checks
