services:
  - type: web
    name: skyops-api
    runtime: docker
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: ./api-gateway
    plan: free
    envVars:
      - key: DB_PATH
        value: /tmp/skyops.db
      - key: REQUEST_TIMEOUT
        value: "10"

  - type: cron
    name: skyops-checks
    runtime: docker
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: ./api-gateway
    schedule: "* * * * *"
    plan: free
    dockerCommand: python -c "import urllib.request; urllib.request.urlopen('https://skyops-api-8dn9.onrender.com/api/run-checks', data=b'')"
    envVars:
      - key: DB_PATH
        value: /tmp/skyops.db
