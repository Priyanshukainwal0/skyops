services:
  - type: web
    name: skyops-api
    runtime: docker
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: ./api-gateway
    plan: free
    envVars:
      - key: DB_PATH
        value: /tmp/skyops.db
      - key: REQUEST_TIMEOUT
        value: "10"
      - key: CHECK_INTERVAL
        value: "60"
      - key: DEFAULT_SERVICES
        value: "TicketDesk|https://ticketdesk-app.onrender.com/health"
